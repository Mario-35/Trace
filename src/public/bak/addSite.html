<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajout d'un site</title>
    <link rel="stylesheet" href="./css/form/main.css">
    <link rel="stylesheet" href="./css/splitter.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/modal.css">
    <link rel="stylesheet" href="./leaflet/leaflet.css">

</head>

<body>
	<header id="splitter-nav-site" class="splitter-nav-site"></header>
    <form id="actionForm" class="formData" enctype="multipart/form-data" method="POST">
        <input type="hidden" id="ctx" name="ctx" value="0" />
    <main class="main-view">
        <div class="splitter-nav-view" id="left-pane">
        </div>
            <div class="v-drag" id="separator"></div>
            <div class="content" id="right-pane">
                <div class="container">
                    <div class="header">
                        <h1 id="formTitle"></h1>
                    </div>                    
                    <div class="form-container">
                        <!-- Step 1: Prélevement -->
                        <div class="form-step active">
                                <div class="form-row">
                                    <div class="form-group row-1">
                                        <label for="nom">
                                            <span tooltip="Nom du site permettant les rapprochements lors des recherches" flow="right">Nom</span>
                                        </label>
                                        <input type="text" id="nom" name="nom" class="form-control" maxlength="25" placeholder="nom">
                                        <div class="error-message" id="nom-error">Indiquer le nom du site</div>
                                        <label for="pays">Pays</label>
                                        <input type="text" id="pays" name="pays" class="form-control" maxlength="25" placeholder="Pays">
                                        <div class="error-message" id="pays-error">Indiquer le pays</div>
                                        <label for="region">
                                            <span tooltip="Saisissez le code postal sur 2 ou 5 chiffres pour effectuer une recherche" flow="right">Région</span>
                                        </label>
                                        <input type="text" id="region" name="region" class="form-control" maxlength="30" placeholder="Region">
                                        <div class="error-message" id="region-error">Indiquer la région</div>
                                        <label for="latitude">
                                            <span tooltip="Latitude en degré décimal au format WGS84">Latitude</span>
                                        </label>
                                        <input type="text" id="latitude" name="latitude" class="form-control" maxlength="15" placeholder="Point X">
                                        <div class="error-message" id="latitude-error">Indiquer la Latitude au format WGS84</div>
                                        <label for="longitude">
                                            <span tooltip="Longitude en degré décimal au format WGS84">Longitude</span>
                                        </label>
                                        <input type="text" id="longitude" name="longitude" class="form-control" maxlength="15" placeholder="Point Y">
                                        <div class="error-message" id="longitude-error">Indiquer la Longitude au format WGS84</div>
                                        <hr>
                                        <button class="btn btn-api form-group float-end" id="btnApiRpg" title="Interroger Registre Parcellaire Graphique">🌍 Registre Parcellaire Graphique</button>
                                    </div>
                                    <div class="form-group row-1">
                                        <div id="map" style="width: 600px; height: 400px;"></div>
                                    </div>                                    
                                </div>

                                <div class="form-row">
                                    <div class="form-group row-1" id="rpgTab"></div>  
                                </div>

                            <div class="btn-group">
                                <button class="btn btn-warning form-group float-start" id="btn-annuler">❌ Annuler</button>
                                <button class="btn btn-primary form-group float-end" type="submit" id="btn-creer">✔️️ Créer</button>
                            </div>
                            <textarea id="cultures" class="form-control invisible" name="cultures"></textarea>
                        </div>                
                    </div>
                </div>

                
                
            </div>
        </main>
    </form>
    <div class="modal-container">
      <input id="modal-toggle" type="checkbox">
      <label class="modal-backdrop" id="modal-ouside"></label>  
      <div id="modal" class="modal-content"> 
      </div>          
    </div>  
</body> 

<!-- awlays first -->
<script src="./js/configuration.js"></script>
<script src="./js/constants.js"></script>
<script src="./js/all.js"></script>
<script src="./js/common/splitter.js"></script>
<script src="./js/common/menu.js"></script>
<script src="./js/form.js"></script>
<script src="./js/api.js"></script>
<script src="./js/api/rpg.js"></script>
<script src="./js/helper.js"></script>
<script src="./js/common/modal.js"></script>
<script src="./leaflet/leaflet.js"></script>
<script src="./js/sites/add.js"></script>
<script src="./js/common/regions.js"></script>     
<script src="./js/sites/event.js"></script>   
<script src="./js/sites/controller.js"></script>
</html>
